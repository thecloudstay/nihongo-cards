<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>일본어 카드모음 — 일본어 단어 암기 · JLPT 단어 퀴즈 (히라가나·가타카나·한자)</title>
<meta name="description" content="4지선다 퀴즈+타이머+오답복습으로 외우는 일본어 단어카드. 히라가나·가타카나·JLPT N5~N1 무료 시작, 공항·호텔·음식점 등 상황별 단어와 원어민 발음 지원. 구독 없음, 팩당 1회 구매 영구 소유.">
<meta property="og:title" content="일본어 카드모음 — 일본어 단어 암기 퀴즈">
<meta property="og:description" content="히라가나부터 JLPT까지, 4지선다 퀴즈로 외우는 일본어 단어카드. 무료로 시작하세요.">
<meta property="og:type" content="website">
<meta property="og:locale" content="ko_KR">
<!-- 배포 후 도메인 확정 시: <meta property="og:url" content="https://도메인"> <meta property="og:image" content="https://도메인/og.png"> -->
<meta name="theme-color" content="#ff7a59">
<script src="https://cdn.paddle.com/paddle/v2/paddle.js"></script>
<style>
  :root{
    --ink:#1a1a1a; --sub:#9a9a9a; --line:#eee; --bg:#fff; --soft:#f7f7f8;
    --ok:#1f9d55; --ok-bg:#eaf7ef; --ok-bd:#a9dcbd;
    --miss:#e0533d; --miss-bg:#fdf0ed; --miss-bd:#f2c3b8;
    --accent:#ff7a59; --free:#1f9d55; --lock:#b0b0b0;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif;
    display:flex;flex-direction:column;min-height:100dvh;
    max-width:520px;margin:0 auto;width:100%;box-shadow:0 0 0 1px var(--line)}
  .screen{display:none;flex-direction:column;flex:1;min-height:100dvh}
  .screen.on{display:flex}
  .jp{font-family:"Hiragino Sans","Yu Gothic","Noto Sans JP",sans-serif}

  /* ─── 홈 / 네비게이터 ─── */
  .home-hd{padding:34px 24px 20px}
  .home-hd .app{font-size:32px;font-weight:900;letter-spacing:-.8px}
  .home-hd .app .en{font-size:14px;color:var(--sub);font-weight:600;margin-top:6px;letter-spacing:.5px}
  .tabs{display:flex;gap:8px;padding:0 24px 14px;border-bottom:1px solid var(--line)}
  .tabs button{flex:1;padding:14px;border:none;background:none;font-size:17px;font-weight:800;color:var(--sub);
    border-bottom:3px solid transparent;cursor:pointer;margin-bottom:-15px;transition:.15s}
  .tabs button .s{display:block;font-size:12px;font-weight:600;margin-top:3px;opacity:.7}
  .tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
  .list{flex:1;overflow-y:auto;padding:8px 18px 40px}
  .grp{margin-top:20px}
  .grp-h{display:flex;align-items:baseline;gap:8px;padding:0 4px 10px}
  .grp-h .k{font-size:16px;font-weight:800}
  .grp-h .j{font-size:12px;color:var(--sub)}
  .cat{display:flex;align-items:center;gap:14px;padding:19px 18px;border:1px solid var(--line);
    border-radius:18px;margin-bottom:11px;cursor:pointer;background:#fff;transition:.15s;
    box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .cat:hover{border-color:#d8d8d8;box-shadow:0 4px 14px rgba(0,0,0,.06);transform:translateY(-1px)}
  .cat:active{background:var(--soft);transform:translateY(0)}
  .cat.locked,.cat.soon{cursor:default}
  .cat .txt{flex:1;min-width:0}
  .cat .txt .k{font-size:18px;font-weight:800;letter-spacing:-.3px}
  .cat .txt .j{font-size:13px;color:var(--sub);margin-top:3px}
  .cat.locked .txt .k,.cat.soon .txt .k{color:#bbb}
  .cat .meta{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
  .cat .num{font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums}
  .badge{font-size:11px;font-weight:800;padding:3px 10px;border-radius:20px;letter-spacing:.3px}
  .badge.free{color:var(--free);background:#eaf7ef}
  .badge.lock{color:#fff;background:var(--lock)}
  .badge.soon{color:#c98a00;background:#fff6e0}
  .cat .arrow{color:#ccc;font-size:18px;flex-shrink:0}
  .cat.locked .arrow,.cat.soon .arrow{opacity:.3}

  /* ─── 설정 ─── */
  .top{display:flex;align-items:center;gap:12px;padding:16px 20px 10px}
  .top .back{font-size:24px;color:var(--ink);background:none;border:none;cursor:pointer;line-height:1}
  .top .title{font-size:16px;font-weight:800}
  .top .title .s{font-size:11px;color:var(--sub);font-weight:600}
  .top .count{margin-left:auto;font-size:13px;color:var(--sub);font-variant-numeric:tabular-nums}
  .setup-body{flex:1;display:flex;flex-direction:column;justify-content:center;padding:20px 24px;gap:22px}
  .setup-cat{text-align:center;margin-bottom:6px}
  .setup-cat .k{font-size:30px;font-weight:900;letter-spacing:-.5px}
  .setup-cat .j{font-size:15px;color:var(--sub);margin-top:5px}
  .row .lab{font-size:14px;color:var(--sub);font-weight:700;margin-bottom:10px}
  .seg{display:flex;gap:9px;flex-wrap:wrap}
  .seg button{flex:1;min-width:60px;padding:15px;border:1.5px solid var(--line);border-radius:14px;background:#fff;font-weight:800;font-size:15px;cursor:pointer;color:var(--sub);transition:.15s}
  .seg button.on{border-color:var(--ink);color:var(--ink);background:var(--soft)}
  .start{padding:19px;border-radius:18px;background:var(--ink);color:#fff;border:none;font-size:17px;font-weight:800;cursor:pointer;letter-spacing:-.3px;box-shadow:0 4px 14px rgba(0,0,0,.18);transition:.15s}
  .start:active{transform:scale(.98)}

  /* ─── 퀴즈 ─── */
  .timer{height:8px;background:var(--line);margin:0 20px;border-radius:8px;overflow:hidden}
  .timer>i{display:block;height:100%;background:var(--accent);width:100%;border-radius:8px;transition:width .05s linear}
  .timer-label{text-align:right;font-size:13px;color:var(--sub);margin:6px 20px 0;font-variant-numeric:tabular-nums}
  .quiz{flex:1;display:flex;flex-direction:column;padding:8px 20px 20px}
  .glyphwrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:180px}
  @keyframes pop{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .glyph{font-size:150px;line-height:1;font-weight:500;animation:pop .18s ease}
  .glyph.small{font-size:104px}
  .example{min-height:44px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;margin:-6px 0 10px}
  .example.show{opacity:1}
  .example .card2{background:var(--soft);border-radius:12px;padding:10px 22px;text-align:center}
  .example .w{font-size:23px;font-weight:700;line-height:1.2}
  .example .yrow{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:3px}
  .example .y{font-size:16px;color:var(--accent);font-weight:600}
  .example .exspeak{background:none;border:none;cursor:pointer;font-size:15px;padding:0 2px;line-height:1}
  .example .exspeak:active{transform:scale(.9)}
  .example .m{font-size:12px;color:var(--sub);margin-top:2px}
  .opts{display:flex;flex-direction:column;gap:12px}
  .opt{padding:21px;border:1.5px solid var(--line);border-radius:18px;background:#fff;font-size:21px;font-weight:700;cursor:pointer;text-align:center;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .opt:hover{border-color:#d8d8d8}
  .opt:active{background:var(--soft)}
  .opt.correct{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}
  .opt.wrong{background:var(--miss-bg);border-color:var(--miss-bd);color:var(--miss)}
  .opt.dim{opacity:.45}
  .opts.locked .opt{cursor:default}
  .ctrl{display:flex;align-items:center;justify-content:center;gap:26px;padding:10px 20px calc(18px + env(safe-area-inset-bottom))}
  .ctrl button{width:60px;height:60px;border-radius:50%;border:1px solid var(--line);background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center}
  .ctrl button:active{background:var(--soft)}
  .ctrl .next{background:var(--ink);border:none}
  .ctrl .next svg{stroke:#fff}
  .ctrl button svg{width:24px;height:24px;fill:none;stroke:var(--ink);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ─── 결과 ─── */
  .done{flex:1;display:none;flex-direction:column;align-items:center;padding:24px 24px 34px;overflow-y:auto}
  .done.on{display:flex}
  .scorebox{margin:14px 0 6px}
  .blob{width:180px;height:162px;background:linear-gradient(135deg,#8b7bff,#b57bff);border-radius:46% 54% 50% 50%/54% 46% 54% 46%;display:flex;align-items:center;justify-content:center}
  .score{font-size:64px;font-weight:900;color:#fff;letter-spacing:-1px;text-align:center}
  .score small{display:block;font-size:23px;font-weight:600;opacity:.85;margin-top:-4px}
  .done .label{font-size:15px;color:var(--sub);margin-bottom:22px;text-align:center}
  .miss-list{width:100%;max-width:360px}
  .miss-list h3{font-size:13px;color:var(--sub);margin-bottom:10px;font-weight:700}
  .mrow{display:flex;align-items:center;gap:14px;padding:12px 4px;border-bottom:1px solid var(--line)}
  .mrow .mg{font-size:30px;width:44px;text-align:center}
  .mrow .ma{font-size:15px;color:var(--sub)}
  .mrow .ma b{color:var(--ink);font-weight:700}
  .actions{margin-top:auto;width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px;padding-top:26px}
  .actions button{padding:19px;border-radius:18px;font-size:16px;font-weight:800;cursor:pointer;border:1.5px solid var(--line);background:#fff;transition:.15s}
  .actions button:active{transform:scale(.98)}
  .actions .primary{background:var(--accent);color:#fff;border:none}
  .actions button:disabled{opacity:.35;cursor:default}

  .restore-link{background:none;border:1px solid #ddd;border-radius:16px;font-size:12px;color:#888;padding:5px 12px;cursor:pointer;margin-top:6px}
  .restore-link:active{background:#f4f4f4}
  .legal-links{text-align:center;padding:24px 0 8px;font-size:12px;color:#bbb}
  .legal-links a{color:#aaa;text-decoration:none}
  .preview-note{margin:10px 0;padding:10px 14px;background:#fff7ec;border:1px solid #ffd9a8;border-radius:12px;font-size:13px;color:#7a5320;line-height:1.5}
  .preview-note .buy-mini{margin-left:6px;background:var(--accent);color:#fff;border:none;border-radius:10px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer}
  /* ─── 50음도표 ─── */
  .chart-entry{background:var(--soft)}
  .chart-seg{padding:12px 20px 0}
  .chart-hint{text-align:center;font-size:13px;color:var(--sub);padding:12px 0 2px}
  .chart-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;padding:12px 20px 40px;overflow-y:auto}
  .chart-cell{border:1.5px solid var(--line);border-radius:14px;padding:12px 4px 9px;text-align:center;cursor:pointer;background:#fff;transition:.12s;box-shadow:0 1px 3px rgba(0,0,0,.03)}
  .chart-cell .kn{font-size:30px;line-height:1.2}
  .chart-cell .rm{font-size:11px;color:var(--sub);margin-top:3px}
  .chart-cell.hit{border-color:var(--accent);background:#fff6f3;transform:scale(.94)}
  .chart-cell.empty{border:none;background:none;box-shadow:none;cursor:default}
  /* ─── 내 구매 ─── */
  .acc-desc{font-size:14px;color:var(--sub);line-height:1.7;margin-bottom:18px}
  .acc-input{width:100%;padding:16px;border:1.5px solid var(--line);border-radius:14px;font-size:16px;margin-bottom:10px;outline:none}
  .acc-input:focus{border-color:var(--ink)}
  .acc-row{display:flex;justify-content:space-between;align-items:center;padding:16px 4px;border-bottom:1px solid var(--line);font-size:15px}
  .acc-row span{color:var(--sub);font-size:13px}
  .acc-email{font-weight:800;font-size:16px;border-bottom:2px solid var(--ink)}
  .acc-out{margin-top:22px;width:100%;padding:15px;border:1.5px solid var(--line);border-radius:14px;background:#fff;color:#c33;font-weight:700;cursor:pointer}
  .toast{position:fixed;left:50%;bottom:40px;transform:translateX(-50%) translateY(20px);background:#111;color:#fff;font-size:13px;font-weight:600;padding:12px 20px;border-radius:30px;opacity:0;transition:.25s;pointer-events:none;z-index:100}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ═══ 홈 / 네비게이터 ═══ -->
<div class="screen on" id="home">
  <div class="home-hd">
    <div class="app">일본어 카드모음<div class="en">にほんご カード · 読みテスト</div></div>
    <button class="restore-link" onclick="openAccount()">내 구매 · 로그인</button>
    <button class="restore-link" id="muteBtn" onclick="toggleMute()">🔊 소리 켬</button>
  </div>
  <div class="tabs">
    <button class="on" data-sec="kana" onclick="switchTab('kana',this)">かな 기초<span class="s">仮名</span></button>
    <button data-sec="kanji" onclick="switchTab('kanji',this)">한자<span class="s">漢字</span></button>
  </div>
  <div class="list" id="catList"></div>
  <div class="legal-links"><a href="privacy.html">개인정보처리방침</a> · <a href="terms.html">이용약관·환불정책</a></div>
</div>

<!-- ═══ 설정 ═══ -->
<div class="screen" id="setup">
  <div class="top">
    <button class="back" onclick="show('home')">‹</button>
    <span class="title">테스트 설정<span class="s"> 選択</span></span>
  </div>
  <div class="setup-body">
    <div class="setup-cat"><div class="k" id="setupK">청음</div><div class="j" id="setupJ">清音</div></div>
    <div class="preview-note" id="previewNote" style="display:none"></div>
    <div class="row"><div class="lab">문제 개수</div>
      <div class="seg" id="segCount">
        <button data-n="10">10</button><button data-n="20" class="on">20</button>
        <button data-n="30">30</button><button data-n="0">전체</button>
      </div>
    </div>
    <div class="row" id="typeRow" style="display:none"><div class="lab">문제 유형</div>
      <div class="seg" id="segType">
        <button data-m="meaning" class="on">뜻 맞히기</button>
        <button data-m="reading">읽기 맞히기</button>
      </div>
    </div>
    <div class="row"><div class="lab">제한 시간 (문제당)</div>
      <div class="seg" id="segTime">
        <button data-t="3">3초</button><button data-t="5" class="on">5초</button>
        <button data-t="8">8초</button><button data-t="0">없음</button>
      </div>
    </div>
    <button class="start" onclick="startQuiz()">테스트 시작 →</button>
  </div>
</div>

<!-- ═══ 퀴즈 ═══ -->
<div class="screen" id="quizScreen">
  <div class="top">
    <button class="back" onclick="show('setup')">‹</button>
    <span class="title" id="qtitle">읽기 테스트</span>
    <span class="count" id="count">1 / 20</span>
  </div>
  <div class="timer"><i id="tbar"></i></div>
  <div class="timer-label" id="tlabel">0:05</div>
  <div class="quiz">
    <div class="glyphwrap"><div class="glyph jp" id="glyph">あ</div></div>
    <div class="example" id="example"></div>
    <div class="opts" id="opts"></div>
  </div>
  <div class="ctrl">
    <button onclick="togglePause()" id="pauseBtn" aria-label="일시정지">
      <svg viewBox="0 0 24 24"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </button>
    <button class="next" onclick="skip()" aria-label="다음">
      <svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<!-- ═══ 결과 ═══ -->
<div class="done" id="done">
  <div class="scorebox"><div class="blob" id="blob"><div class="score"><span id="scoreNum">0</span><small>/ <span id="scoreTot">20</span></small></div></div></div>
  <div class="label" id="doneLabel">내 점수</div>
  <div class="miss-list" id="missWrap"><h3 id="missTitle">틀린 문자</h3><div id="missRows"></div></div>
  <div class="actions">
    <button class="primary" id="reviewBtn" onclick="reviewMiss()">틀린 문자 다시 풀기</button>
    <button onclick="show('home')">다른 카드 고르기</button>
  </div>
</div>

<!-- ═══ 50음도표 (무료) ═══ -->
<div class="screen" id="chartScreen">
  <div class="top">
    <button class="back" onclick="show('home')">‹</button>
    <span class="title">50음도표 한 번에 끝내기<span class="s"> 五十音図</span></span>
  </div>
  <div class="chart-seg seg" id="chartSeg">
    <button class="on" onclick="setChart('h',this)">ひらがな</button>
    <button onclick="setChart('k',this)">カタカナ</button>
  </div>
  <div class="chart-hint">글자를 누르면 발음이 나와요 🔊</div>
  <div class="chart-grid" id="chartGrid"></div>
</div>

<!-- ═══ 내 구매 · 로그인 ═══ -->
<div class="screen" id="account">
  <div class="top">
    <button class="back" onclick="show('home')">‹</button>
    <span class="title">내 구매<span class="s"> マイページ</span></span>
  </div>
  <div class="setup-body" style="justify-content:flex-start">
    <div id="accLoggedOut">
      <p class="acc-desc">구매 시 사용한 <b>이메일</b>과, 결제 후 메일로 받은 <b>라이선스 키</b>를 입력하면
      구매 내역을 불러오고 이 기기에서 잠금이 해제됩니다.<br>키를 잃어버렸다면 문의: thecloudstay@gmail.com</p>
      <input id="accEmail" class="acc-input" type="email" placeholder="이메일" autocomplete="email">
      <input id="accToken" class="acc-input" type="text" placeholder="라이선스 키">
      <button class="start" style="width:100%" onclick="accLogin()">로그인 · 구매 복원</button>
    </div>
    <div id="accLoggedIn" style="display:none">
      <div class="acc-row acc-email" id="accWho"></div>
      <div id="accPacks"></div>
      <button class="acc-out" onclick="accLogout()">이 기기에서 로그아웃</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══ 카테고리 구조 (한글 메인/일본어 서브) ══
const NAV = {
  kana:[
    {ko:"",jp:"",items:[
      {code:"hiragana",ko:"히라가나",jp:"ひらがな",n:46,ready:true,tier:"free"},
      {code:"katakana",ko:"가타카나",jp:"カタカナ",n:111,ready:false,tier:"free"},
    ]},
  ],
  kanji:[
    {ko:"자격시험 JLPT",jp:"日本語能力試験",items:[
      {code:"N5",ko:"N5 · 입문",jp:"N5",n:99,ready:true,tier:"free"},
      {code:"N4",ko:"N4 · 초급",jp:"N4",n:100,ready:false,tier:"paid"},
      {code:"N3",ko:"N3 · 중급",jp:"N3",n:100,ready:false,tier:"paid"},
      {code:"N2",ko:"N2 · 중상급",jp:"N2",n:100,ready:false,tier:"paid"},
      {code:"N1",ko:"N1 · 상급",jp:"N1",n:100,ready:false,tier:"paid"},
    ]},
    {ko:"상황·장면별",jp:"場面別",items:[
      {code:"B2",ko:"호텔",jp:"ホテル",n:100,ready:false,tier:"paid"},
      {code:"B1",ko:"공항·출입국",jp:"空港・出入国",n:100,ready:false,tier:"paid"},
      {code:"B3",ko:"음식점",jp:"飲食店",n:100,ready:false,tier:"paid"},
      {code:"B9",ko:"애니·만화",jp:"アニメ・漫画",n:100,ready:false,tier:"paid"},

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]];}return a;}

function startQuiz(){
  reviewRound=0;
  const pool=DATA[curCat.code];
  const n = CONF.count===0 ? pool.length : Math.min(CONF.count,pool.length);
  deck=shuffle(pool).slice(0,n);
  qi=0;correct=0;misses=[];
  $("qtitle").textContent = isKanjiCat() ? `${curCat.ko} · ${CONF.mode==="reading"?"읽기":"뜻"}` : `${curCat.ko} 읽기`;
  $("scoreTot").textContent=deck.length;
  show("quizScreen"); loadQ();
}

function loadQ(){
  answered=false;paused=false;
  const q=deck[qi]; const g=$("glyph"); g.textContent=q.front; g.classList.toggle("small",q.front.length>1);
  $("count").textContent=`${qi+1} / ${deck.length}`;
  $("example").className="example"; $("example").innerHTML="";
  const pool=DATA[curCat.code];
  const wrongs=shuffle(pool.filter(x=>x.front!==q.front)).slice(0,3);
  const opts=shuffle([q,...wrongs]);
  const box=$("opts");box.className="opts";box.innerHTML="";
  opts.forEach(o=>{const b=document.createElement("button");b.className="opt";b.textContent=optText(o);b.dataset.front=o.front;b.onclick=()=>choose(b,o,q);box.appendChild(b);});
  if(!(isKanjiCat() && CONF.mode==="reading")){ sched(()=>speak(q.speak), 250); }
  startTimer();
}
function startTimer(){
  clearInterval(timerId);
  if(CONF.time===0){$("tbar").style.width="100%";$("tlabel").textContent="∞";return;}
  const total=CONF.time*1000, t0=performance.now();
  $("tbar").style.width="100%";
  timerId=setInterval(()=>{ if(paused){return;}
    const left=Math.max(0,total-(performance.now()-t0));
    $("tbar").style.width=(left/total*100)+"%";
    $("tlabel").textContent="0:0"+Math.ceil(left/1000);
    if(left<=0){clearInterval(timerId);timeUp();}
  },50);
}
function choose(btn,o,q){
  if(answered)return; answered=true; clearInterval(timerId);
  const box=$("opts");box.classList.add("locked");
  const ok = o.front===q.front;
  if(ok){btn.classList.add("correct");correct++;}
  else{btn.classList.add("wrong");misses.push(q);[...box.children].forEach(b=>{if(b.dataset.front===q.front)b.classList.add("correct");});}
  [...box.children].forEach(b=>{if(!b.classList.contains("correct")&&!b.classList.contains("wrong"))b.classList.add("dim");});
  sfx(ok?"ok":"fail");
  const showEx = isKanjiCat() && q.ex;
  if(showEx) showExample(q);
  sched(()=>speak(showEx ? q.exy : q.speak), ok ? 550 : 500); // 효과음 후 발음 (예문 우선)
  sched(nextQ, showEx ? 3200 : 1300);                         // 예문 재생이 잘리지 않게 여유
}
function timeUp(){
  if(answered)return; answered=true; misses.push(deck[qi]);
  const q=deck[qi]; const box=$("opts");box.classList.add("locked");
  [...box.children].forEach(b=>{if(b.dataset.front===q.front)b.classList.add("correct");else b.classList.add("dim");});
  sfx("fail");
  const showEx = isKanjiCat() && q.ex;
  if(showEx) showExample(q);
  sched(()=>speak(showEx ? q.exy : q.speak), 450);
  sched(nextQ, showEx ? 3200 : 1400);
}

}
function skip(){ if(!answered)timeUp(); else nextQ(); }

// ── 발음: 사전생성 MP3(audio_manifest.json) 우선 → Web Speech 폴백 ──
let AUDIO_MANIFEST=null; const _audioCache={};
(async()=>{ try{ const r=await fetch("audio_manifest.json",{cache:"no-store"}); if(r.ok) AUDIO_MANIFEST=await r.json(); }catch(e){} })();
function speak(t){
  t=String(t||""); if(!t||MUTED) return;
  if(AUDIO_MANIFEST){
    const h=AUDIO_MANIFEST[t]||AUDIO_MANIFEST[t.split("/")[0]];
    if(h){
      try{
        const a=_audioCache[h]||(_audioCache[h]=new Audio("audio/"+h+".mp3"));
        a.currentTime=0; a.play().catch(()=>speakWS(t));
        return;
      }catch(e){}
    }
  }
  speakWS(t);
}
function speakWS(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(String(t).split("/")[0]);u.lang="ja-JP";u.rate=0.85;speechSynthesis.speak(u);}catch(e){}}
// ── 효과음: 정답=임팩트 있는 띠링↑, 오답=강한 부저 ──
let _actx;
function _ac(){ _actx=_actx||new (window.AudioContext||window.webkitAudioContext)(); if(_actx.state==="suspended")_actx.resume(); return _actx; }
function tone(freq,delay,dur,wave,vol){
  const ctx=_ac(), t=ctx.currentTime+delay;
  const o=ctx.createOscillator(), g=ctx.createGain();
  o.type=wave||"sine"; o.frequency.value=freq;
  o.connect(g); g.connect(ctx.destination);
  g.gain.setValueAtTime(0.0001,t);
  g.gain.exponentialRampToValueAtTime(vol||0.28,t+0.015);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.start(t); o.stop(t+dur+0.02);
}
// ── 소리 끄기 토글 ──
let MUTED = (()=>{ try{ return localStorage.getItem('muted')==='1'; }catch(e){ return false; } })();
function toggleMute(){
  MUTED=!MUTED; try{ localStorage.setItem('muted', MUTED?'1':'0'); }catch(e){}
  const b=$("muteBtn"); if(b) b.textContent = MUTED ? "🔇 소리 끔" : "🔊 소리 켬";
  if(MUTED){ try{ speechSynthesis.cancel(); }catch(e){} }
  toast(MUTED ? "소리를 껐어요" : "소리를 켰어요");
}
function sfx(type){
  if(MUTED) return;
  try{
    if(type==="ok"){   // 임팩트 있는 "띠링↑" (게임 코인 스타일, 짧고 경쾌)
      tone(1318.5,0,0.06,"triangle",0.38); tone(1760,0.06,0.08,"triangle",0.36); tone(2637,0.13,0.20,"sine",0.30);
    } else {           // 묵직한 이중 부저 (오답 임팩트)
      tone(110,0,0.28,"sawtooth",0.42); tone(104,0.01,0.28,"square",0.30);
      tone(98,0.32,0.36,"sawtooth",0.45); tone(92,0.33,0.36,"square",0.32);
    }
  }catch(e){}
}
// 모바일 오디오 언락: 최초 터치/클릭 1회에서 오디오 재생 권한 확보 (iOS/안드로이드 자동재생 정책 대응)
let _unlocked=false;
function _unlockAudio(){
  if(_unlocked) return; _unlocked=true;
  try{ _ac(); }catch(e){}
  try{ const a=new Audio("data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA="); a.volume=0; const p=a.play(); if(p&&p.then)p.catch(()=>{}); }catch(e){}
  try{ speechSynthesis.cancel(); }catch(e){}
}
document.addEventListener("pointerdown",_unlockAudio,{once:true});
document.addEventListener("touchend",_unlockAudio,{once:true});

function finish(){
  clearInterval(timerId);
  $("scoreNum").textContent=correct; $("scoreTot").textContent=deck.length;
  const seen=new Set(); const uniq=misses.filter(m=>{if(seen.has(m.front))return false;seen.add(m.front);return true;});
  const rows=$("missRows");rows.innerHTML="";
  uniq.forEach(m=>{const d=document.createElement("div");d.className="mrow";d.innerHTML=`<div class="mg jp">${m.front}</div><div class="ma"><b>${m.ko}</b> · ${m.romaji}</div>`;rows.appendChild(d);});
  if(uniq.length===0){
    $("doneLabel").textContent=reviewRound>0?"복습 완료! 모두 맞혔어요 🎉":"만점! 모두 맞혔어요 🎉";
    $("blob").style.background="linear-gradient(135deg,#33c07a,#6ad39a)";
    $("missWrap").style.display="none"; $("reviewBtn").disabled=true; $("reviewBtn").textContent="다시 풀 문자 없음";
  }else{
    $("doneLabel").textContent=reviewRound>0?`복습 ${reviewRound}회차 결과`:"내 점수";
    $("blob").style.background="linear-gradient(135deg,#8b7bff,#b57bff)";
    $("missTitle").textContent=`틀린 문자 ${uniq.length}개`; $("missWrap").style.display="block";
    $("reviewBtn").disabled=false; $("reviewBtn").textContent=`틀린 문자 ${uniq.length}개 다시 풀기`;
  }
  const oldCta=$("buyCta"); if(oldCta) oldCta.remove();
  if(previewMode && curCat){
    const b=document.createElement("button"); b.id="buyCta"; b.className="primary";
    b.textContent=`전체 ${curCat.n}장 잠금해제 — ${priceOf(curCat)}`;
    b.onclick=()=>openBuy(curCat);
    document.querySelector("#done .actions").prepend(b);
  }
  window._miss=uniq.slice();
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on")); $("done").classList.add("on");
}
function reviewMiss(){
  reviewRound++; deck=shuffle(window._miss);qi=0;correct=0;misses=[];
  $("qtitle").textContent=`복습 ${reviewRound}회차 · ${deck.length}개`; $("scoreTot").textContent=deck.length;
  $("done").classList.remove("on"); show("quizScreen"); loadQ();
}

function show(id){
  if(id!=="quizScreen") stopQuiz();   // 퀴즈 이탈 시 타이머·발음·예약 콜백 전부 정지
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("on"));
  $("done").classList.remove("on");
  if(id==="done"){$("done").classList.add("on");}
  else{$(id).classList.add("on");}
}

// ══ GAS 데이터 연동 ══
const API_URL = "https://script.google.com/macros/s/AKfycbxnmDF3XA7ubkM6BhAmAihhRy6lFp1KIppsnn8Us_pOHdHeuKPI03pR_-8QuFrVxLWI/exec";

function rowToCard(r){
  const isKana = String(r.type||"").trim()==="kana";
  const reading = String(r.reading||"").trim();
  const ko = String(r.meaning_ko||"").trim();
  const romaji = isKana ? String(r.meaning_en||"").trim() : reading;
  const speak = isKana ? String(r.front||reading) : (reading.split("/")[0]||reading||String(r.front||""));
  const card = {front:String(r.front||"").trim(), romaji, ko, speak, label:`${ko} [${romaji}]`};
  if(!isKana){ card.ex=String(r.example||"").trim(); card.exy=String(r.example_reading||"").trim(); card.exk=String(r.example_ko||"").trim(); }
  card._order = parseInt(r.order_in_cat,10)||0;
  return card;
}

async function tryFetchRows(url){
  try{ const res=await fetch(url,{cache:"no-store"}); const j=await res.json(); return Array.isArray(j)?j:(j.cards||null); }
  catch(e){ return null; }
}
function ingestRows(rows, markReady){
  const built={};
  rows.forEach(r=>{ const cat=String(r.category||"").trim(); if(!cat) return; (built[cat]=built[cat]||[]).push(rowToCard(r)); });
  Object.keys(built).forEach(cat=>{ built[cat].sort((a,b)=>a._order-b._order); built[cat].forEach(c=>delete c._order); DATA[cat]=built[cat]; });
  if(markReady){ ["kana","kanji"].forEach(tab=> NAV[tab].forEach(g=> g.items.forEach(it=>{
    if(DATA[it.code] && DATA[it.code].length){
      it.ready=true;
      if(!(it.tier==="paid" && !isOwned(it.code))) it.n=DATA[it.code].length;
    }
  }))); }
  return Object.keys(built);
}
// 무료 데이터: 정적 JSON(GitHub Pages 동봉) 우선 → GAS 무료 API 폴백 → 내장 데이터
async function loadData(){
  let rows = await tryFetchRows("cards_free.json");
  if((!rows||!rows.length) && API_URL) rows = await tryFetchRows(API_URL + (API_URL.includes("?")?"&":"?") + "action=cards");
  if(!rows || !rows.length) return false;
  ingestRows(rows, true);
  return true;
}

// ── 라이선스(email+token) 기반 유료 로딩 ──
let LIC = (()=>{ try{ return JSON.parse(localStorage.getItem('license')||'null'); }catch(e){ return null; } })();
async function restorePurchase(email, token){
  if(!API_URL) throw new Error("서버 URL 미설정");
  const r = await fetch(`${API_URL}?action=entitlement&email=${encodeURIComponent(email)}&token=${encodeURIComponent(token)}`,{cache:"no-store"});
  const j = await r.json();
  if(!j.ok) throw new Error(j.error||"키가 올바르지 않습니다");
  LIC={email,token}; localStorage.setItem('license', JSON.stringify(LIC));
  OWNED = new Set(j.packs); saveOwned(); renderNav();
  return j.packs;
}
async function loadPaidCategory(it){
  if(!LIC || !API_URL) return false;
  const r = await fetch(`${API_URL}?action=paidcards&email=${encodeURIComponent(LIC.email)}&token=${encodeURIComponent(LIC.token)}&category=${encodeURIComponent(it.code)}`,{cache:"no-store"});
  const j = await r.json();
  if(!j.ok || !j.cards || !j.cards.length) return false;
  ingestRows(j.cards, false); it.ready=true; it.n=DATA[it.code].length;
  return true;
}

// ── 50음도표 (무료, 터치 발음) ──
const GOJUON_H=[["あ","い","う","え","お"],["か","き","く","け","こ"],["さ","し","す","せ","そ"],["た","ち","つ","て","と"],["な","に","ぬ","ね","の"],["は","ひ","ふ","へ","ほ"],["ま","み","む","め","も"],["や","","ゆ","","よ"],["ら","り","る","れ","ろ"],["わ","","を","","ん"]];
const GOJUON_K=[["ア","イ","ウ","エ","オ"],["カ","キ","ク","ケ","コ"],["サ","シ","ス","セ","ソ"],["タ","チ","ツ","テ","ト"],["ナ","ニ","ヌ","ネ","ノ"],["ハ","ヒ","フ","ヘ","ホ"],["マ","ミ","ム","メ","モ"],["ヤ","","ユ","","ヨ"],["ラ","リ","ル","レ","ロ"],["ワ","","ヲ","","ン"]];
const ROMAJI=[["a","i","u","e","o"],["ka","ki","ku","ke","ko"],["sa","shi","su","se","so"],["ta","chi","tsu","te","to"],["na","ni","nu","ne","no"],["ha","hi","fu","he","ho"],["ma","mi","mu","me","mo"],["ya","","yu","","yo"],["ra","ri","ru","re","ro"],["wa","","o","","n"]];
let chartKind="h";
function openChart(){ renderChart(chartKind); show("chartScreen"); }
function setChart(kind,btn){ chartKind=kind; [...$("chartSeg").children].forEach(b=>b.classList.remove("on")); btn.classList.add("on"); renderChart(kind); }
function renderChart(kind){
  const rows = kind==="h" ? GOJUON_H : GOJUON_K;
  const grid=$("chartGrid"); grid.innerHTML="";
  rows.forEach((row,ri)=>row.forEach((ch,ci)=>{
    const cell=document.createElement("div");
    if(!ch){ cell.className="chart-cell empty"; grid.appendChild(cell); return; }
    cell.className="chart-cell";
    cell.innerHTML=`<div class="kn jp">${ch}</div><div class="rm">${ROMAJI[ri][ci]}</div>`;
    cell.onclick=()=>{ speak(ch); cell.classList.add("hit"); setTimeout(()=>cell.classList.remove("hit"),350); };
    grid.appendChild(cell);
  }));
}

// ── 내 구매 · 로그인 (이메일+라이선스 키) ──
function openAccount(){ renderAccount(); show("account"); }
function renderAccount(){
  const out=$("accLoggedOut"), inn=$("accLoggedIn");
  if(LIC){ out.style.display="none"; inn.style.display="block"; $("accWho").textContent=LIC.email; accFill(); }
  else { out.style.display="block"; inn.style.display="none"; }
}
function packName(code){
  if(code==="ALL") return "라이프타임 · 전체 팩";
  let f=null; ["kana","kanji"].forEach(t=>NAV[t].forEach(g=>g.items.forEach(it=>{ if(it.code===code) f=it; })));
  return f ? f.ko : code;
}
async function accFill(){
  const box=$("accPacks"); box.innerHTML='<div class="acc-row">불러오는 중…</div>';
  let details=null;
  try{
    const r=await fetch(`${API_URL}?action=entitlement&email=${encodeURIComponent(LIC.email)}&token=${encodeURIComponent(LIC.token)}`,{cache:"no-store"});
    const j=await r.json();
    if(j.ok){ OWNED=new Set(j.packs); saveOwned(); details=j.details||null; }
  }catch(e){}
  box.innerHTML="";
  const packs=[...OWNED];
  if(!packs.length){ box.innerHTML='<div class="acc-row">구매 내역이 없습니다</div>'; return; }
  packs.forEach(p=>{
    const d=details && details.find(x=>x.pack===p);
    const when=d && d.date ? new Date(d.date).toLocaleDateString("ko-KR") : "";
    const row=document.createElement("div"); row.className="acc-row";
    row.innerHTML=`<b>${packName(p)}</b><span>${when ? when+" 구매" : "보유 중"}</span>`;
    box.appendChild(row);
  });
  renderNav();
}
async function accLogin(){
  const email=$("accEmail").value.trim(), token=$("accToken").value.trim();
  if(!email||!token){ toast("이메일과 라이선스 키를 모두 입력하세요"); return; }
  toast("확인 중…");
  try{ await restorePurchase(email, token); toast("로그인 완료!"); renderAccount(); }
  catch(e){ toast("실패: "+(e.message||e)); }
}
function accLogout(){
  try{ localStorage.removeItem('license'); localStorage.removeItem('owned_packs'); }catch(e){}
  LIC=null; OWNED=new Set(); renderNav(); renderAccount(); toast("로그아웃했어요");
}

async function initApp(){
  const mb=$("muteBtn"); if(mb && MUTED) mb.textContent="🔇 소리 끔";
  initPaddle();
  await loadData();
  renderNav();
}
initApp();
